NPC_:
  fields:
    DATA: DATA
    DNAM: DNAM

  transforms:
    Name:
      type: trim_languages
      keep: [English]
    Race:
      type: remap_formkey
      source_esm: FalloutNV.esm
      target_esm: Fallout4.esm
  drop:
  - Hair
  - CNTO
  - COED
  - Eyes
  - NAM5

