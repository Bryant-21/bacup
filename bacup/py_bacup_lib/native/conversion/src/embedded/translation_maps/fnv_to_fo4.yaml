skip_records:
  # FO4 NAVI is rebuilt from the emitted NAVM graph with NVER=15. Copying the
  # Gamebryo NVER=11/NVMI byte layout into FO4 is structurally invalid.
  - NAVI
  - NAVM
  - PACK
  - LVLN
  - LVLC
  - HDPT
  - OUTF

material_overrides:
  bgsm_default:
    bCastShadows: true

CREA:
  target_record_type: NPC_
  fields:
    DATA: DATA
    DNAM: DNAM

  transforms:
    Name:
      type: trim_languages
      keep: [English]

  drop:
  - CNTO
  - COED
  - Type

WEAP:
  fields:
    DNAM: DNAM

  transforms:
    Name:
      type: trim_languages
      keep: [English]
  drop:
  - Ammo
  - VATS

IMOD:
  fields:
    Data: Data

  transforms:
    Name:
      type: trim_languages
      keep: [English]

COBJ:
  drop:
  - Name
  - DATA

AMMO:
  fields:
    Name: Name

  transforms:
    Name:
