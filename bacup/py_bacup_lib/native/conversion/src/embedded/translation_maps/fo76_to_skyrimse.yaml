# Fallout 76 -> Skyrim SE record field translation map.
# Conservative canonical map: only fields accepted by both schema surfaces are
# copied directly; FO76-only gameplay/template data is dropped.

WEAP:
  fields:
    FULL: FULL
    DESC: DESC
    MODL: MODL
    ObjectBounds: ObjectBounds
    Data: Data
    CriticalData: CriticalData
    KWDA: KWDA
    ETYP: ETYP
    EquipmentType: EquipmentType
    ImpactDataSet: ImpactDataSet
    BIDS: BIDS
    BAMT: BAMT
    EITM: EITM
    SoundPickUp: SoundPickUp
    SoundPutDown: SoundPutDown
    YNAM: YNAM
    ZNAM: ZNAM
  transforms:
    FULL:
      type: trim_languages
      keep: [English]
    DESC:
      type: trim_languages
      keep: [English]
    MODL:
      type: strip_subfields
      remove: [XFLG, ENLT, ENLS, AUUV, MODD]
    Data:
      type: remap_formkey
      source_esm: SeventySix.esm
      target_esm: Skyrim.esm
    CriticalData:
      type: remap_formkey
      source_esm: SeventySix.esm
      target_esm: Skyrim.esm
    KWDA:
      type: remap_formkey
      source_esm: SeventySix.esm
      target_esm: Skyrim.esm
    ETYP:
      type: remap_formkey
      source_esm: SeventySix.esm
      target_esm: Skyrim.esm
    EquipmentType:
      type: remap_formkey
      source_esm: SeventySix.esm
      target_esm: Skyrim.esm
    ImpactDataSet:
      type: remap_formkey
      source_esm: SeventySix.esm
      target_esm: Skyrim.esm
    BIDS:
      type: remap_formkey
      source_esm: SeventySix.esm
      target_esm: Skyrim.esm
    BAMT:
      type: remap_formkey
      source_esm: SeventySix.esm
      target_esm: Skyrim.esm
    EITM:
      type: remap_formkey
      source_esm: SeventySix.esm
      target_esm: Skyrim.esm
    YNAM:
      type: remap_formkey
      source_esm: SeventySix.esm
      target_esm: Skyrim.esm
    ZNAM:
      type: remap_formkey
      source_esm: SeventySix.esm
      target_esm: Skyrim.esm
  drop:
  - AimAssistModel
  - AimModel
  - AttachParentSlots
  - DamageCurve
  - DamageTypeConditionScalings
  - DamageTypes
  - InstanceNaming
  - NPCAddAmmoList
  - ObjectPlacementDefault
  - ObjectTemplates
  - PreviewTransform
  - RGW2
  - RGW3
  - Zoom
  defaults:
    DetectionSoundLevel: 1

