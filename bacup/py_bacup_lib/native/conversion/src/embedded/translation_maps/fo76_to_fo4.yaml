skip_records:
  - GMST
  # These require non-flat group placement. This only disables the generic
  # top-level writer; structured phases must still emit these under their
  # legal parent groups (for example CELL/LAND/NAVM under WRLD,
  # DIAL under QUST, and INFO under DIAL).
  # SCEN and DLBR are flat top-level records in FO4, so the generic writer
  # emits them directly (payload normalized by the target_normalize SCEN
  # scope emitters + apply_fo4_ck_payload_limits). They were skipped
  # historically for CK-crash safety; set MODBOX_DISABLE_SCEN=1 to re-skip
  # them for an in-game crash bisect (see maps.rs::load).
  - ACHR
  - CELL
  - DIAL
  - INFO
  - LAND
  # FO4 has one top-level NAVI record, but it must describe the emitted NAVM
  # graph. Keep generic copy disabled; structured phases emit NAVM and rebuild NAVI.
  - NAVI
  - NAVM
  - PGRE
  - PHZD
  - PLYR
  - PMIS
  - REFR
  # FO76 Story Manager event nodes use FO76-only runtime event types
  # (for example ILOC/CBGN/LCPG). FO4 CK tries to instantiate those event
  # dispatchers while loading and crashes before validation can report them.
  - SMBN
  - SMEN
  - SMQN
  # FO76 adds default-object assignments for executable-only systems that FO4
  # does not know how to initialize. Emitting them makes CK report
  # [MASTERFILE] invalid default object form errors.
  - DFOB
  # FO76-only collision layers carry one-way collides-with links against FO4
  # base layers and can reuse FO4 layer indices. References are remapped to
  # compatible FO4 layers during native preflight seeding.
  - COLL

