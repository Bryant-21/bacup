skip_records:
  # FO4 NAVI is rebuilt from the emitted NAVM graph with NVER=15. Copying the
  # Gamebryo NVER=11/NVMI byte layout into FO4 is structurally invalid.
  - NAVI
  - NAVM

WEAP:
  fields:
    FULL: FULL
    OBND: OBND
    MODL: MODL
    ETYP: ETYP
    EITM: EITM
    INAM: INAM
    YNAM: YNAM
    ZNAM: ZNAM
  transforms:
    FULL:
      type: trim_languages
      keep: [English, Chinese, German, French, Spanish, Italian, Japanese, Polish, Portuguese_Brazil, Russian]
    MODL:
      type: strip_subfields
      remove: [MODD]
    ETYP:
      type: remap_formkey
      source_esm: Fallout3.esm
      target_esm: Fallout4.esm
    EITM:
      type: remap_formkey
      source_esm: Fallout3.esm
      target_esm: Fallout4.esm
    INAM:
      type: remap_formkey
      source_esm: Fallout3.esm
      target_esm: Fallout4.esm
    YNAM:
      type: remap_formkey
      source_esm: Fallout3.esm
      target_esm: Fallout4.esm
    ZNAM:
      type: remap_formkey
      source_esm: Fallout3.esm
      target_esm: Fallout4.esm
  drop:
  - Ammo
