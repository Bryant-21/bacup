# FO3 Creature -> FO4 Creature skeleton bone mappings.
# Each creature type has its own mapping table.
# Source: Gamebryo Bip01 naming convention (Fallout 3).
# Target: Creation Engine naming convention (Fallout 4).
#
# Creatures with fundamentally different skeleton architectures between
# games (e.g. radscorpion with 8 legs vs 4 pairs) have best-effort
# mappings for the shared body plan.

creatures:

  # ================================================================
  # DEATHCLAW
  # FO3: Bip01-prefixed biped with Toe0/Toe1/Toe2, Finger0-4, Tail-Tail5
  # FO4: Unprefixed with CAPS legs, numbered toes, 7-segment tail
  # ================================================================
  deathclaw:
    display_name: "FO3 Deathclaw → FO4 Deathclaw"
    # Bone names that identify this skeleton type (for auto-detection)
    signature_bones: ["Bip01 Tail", "Bip01 L Toe0", "Bip01 L Toe1", "Bip01 L Toe2"]
    fo4_signature_bones: ["LTHIGH", "Tail1", "SpineRoot"]
    bones:
      # --- Root ---
      "Bip01": "Root"
      "Bip01 NonAccum": "COM"

      # --- Spine ---
      "Bip01 Pelvis": "Pelvis"
      "Bip01 Spine": "SpineRoot"
      "Bip01 Spine1": "Spine01"
      "Bip01 Spine2": "Spine02"

      # --- Neck / Head ---
      "Bip01 Neck": "SpineControl"
      "Bip01 Neck1": "NeckRoot"
      "Bip01 Head": "HEAD"

      # --- Left Arm ---
      "Bip01 L Clavicle": "LArmClavicle"
      "Bip01 L UpperArm": "LArmUpperArm"
      "Bip01 L Forearm": "LArmForeArm"
      "Bip01 L Hand": "LArmHand"
      "Bip01 L Finger0": "LArmThumb1"
      "Bip01 L Finger01": "LArmThumb2"
      "Bip01 L Finger1": "LArmIndex1"
      "Bip01 L Finger11": "LArmIndex2"
      "Bip01 L Finger2": "LArmMiddle1"
      "Bip01 L Finger21": "LArmMiddle2"
      "Bip01 L Finger3": "LArmRing1"
      "Bip01 L Finger31": "LArmRing2"
      "Bip01 L Finger4": "LArmPinky1"
      "Bip01 L Finger41": "LArmPinky2"

      # --- Right Arm ---
      "Bip01 R Clavicle": "RArmClavicle"
      "Bip01 R UpperArm": "RArmUpperArm"
      "Bip01 R Forearm": "RArmForeArm"
      "Bip01 R Hand": "RArmHand"
      "Bip01 R Finger0": "RArmThumb1"
      "Bip01 R Finger01": "RArmThumb2"
      "Bip01 R Finger1": "RArmIndex1"
      "Bip01 R Finger11": "RArmIndex2"
      "Bip01 R Finger2": "RArmMiddle1"
      "Bip01 R Finger21": "RArmMiddle2"
      "Bip01 R Finger3": "RArmRing1"
      "Bip01 R Finger31": "RArmRing2"
      "Bip01 R Finger4": "RArmPinky1"
      "Bip01 R Finger41": "RArmPinky2"

      # --- Left Leg ---
      "Bip01 L Thigh": "LTHIGH"
      "Bip01 L Calf": "LCALF"
      "Bip01 L Foot": "LFOOT"
      "Bip01 L Toe0": "LToe1"
      "Bip01 L Toe01": "LToe2"
      "Bip01 L Toe1": "LToe3"
      "Bip01 L Toe2": "LToe4"

      # --- Right Leg ---
      "Bip01 R Thigh": "RTHIGH"
      "Bip01 R Calf": "RCALF"
      "Bip01 R Foot": "RFOOT"
      "Bip01 R Toe0": "RToe1"
      "Bip01 R Toe01": "RToe2"
      "Bip01 R Toe1": "RToe3"
      "Bip01 R Toe2": "RToe4"

      # --- Tail (FO3 has 6 segments, FO4 has 7 — last segment unmapped) ---
      "Bip01 Tail": "Tail1"
      "Bip01 Tail1": "Tail2"
      "Bip01 Tail2": "Tail3"
      "Bip01 Tail3": "Tail4"
      "Bip01 Tail4": "Tail5"
      "Bip01 Tail5": "Tail6"

      # --- Special ---
      "Bip01 Ponytail1": "Jaw"
      "Bip01 Brain": "Nose"
      "Weapon": "WEAPON"

  # ================================================================
  # DOG (FO3 dog → FO4 Dogmeat)
  # FO3: Bip01-prefixed biped with front/rear legs using standard L/R naming
  # FO4: Dogmeat_ prefixed quadruped with explicit Front/Rear leg naming
  # ================================================================
  dog:
    display_name: "FO3 Dog → FO4 Dogmeat"
    signature_bones: ["Bip01 Ponytail1", "Bip01 L Finger0", "Bip01 Tail"]
    fo4_signature_bones: ["Dogmeat_Root", "Dogmeat_Front_LLeg1", "Dogmeat_Tail1"]
    bones:
      # --- Root ---
      "Bip01": "Dogmeat_Root"
      "Bip01 NonAccum": "Dogmeat_COM"

      # --- Spine ---
      "Bip01 Pelvis": "Dogmeat_Pelvis"
      "Bip01 Spine": "Dogmeat_Spine1"
      "Bip01 Spine1": "Dogmeat_Spine2"
      "Bip01 Neck": "Dogmeat_Spine3"

      # --- Chest / Ribcage ---
      # FO3 dog uses Spine2→Neck hierarchy similar to FO4 Ribcage
      # Bip01 Spine1 (above) maps to Spine2; the actual ribcage area:
      "Bip01 Head": "Dogmeat_Head"

      # --- Head / Neck ---
      # FO3 has Bip01 Neck → Bip01 Head
      # FO4 has Dogmeat_Ribcage → Dogmeat_Neck1 → Dogmeat_Neck2 → Dogmeat_Head
      "Bip01 Head Jaw": "Dogmeat_Jaw"
      "Bip01 Head Muzzle": "Dogmeat_Nose"

      # --- Front Left Leg (FO3 uses L arm bones) ---
      "Bip01 L Clavicle": "Dogmeat_Front_LLegCollarbone"
      "Bip01 L UpperArm": "Dogmeat_Front_LLeg1"
      "Bip01 L Forearm": "Dogmeat_Front_LLeg2"
      "Bip01 L Hand": "Dogmeat_Front_LLegAnkle"
      "Bip01 L Finger0": "Dogmeat_Front_LLegToe1"

      # --- Front Right Leg ---
      "Bip01 R Clavicle": "Dogmeat_Front_RLegCollarbone"
      "Bip01 R UpperArm": "Dogmeat_Front_RLeg1"
      "Bip01 R Forearm": "Dogmeat_Front_RLeg2"
      "Bip01 R Hand": "Dogmeat_Front_RLegAnkle"
      "Bip01 R Finger0": "Dogmeat_Front_RLegToe1"

      # --- Rear Left Leg ---
      "Bip01 L Thigh": "Dogmeat_Rear_LLeg1"
      "Bip01 L Calf": "Dogmeat_Rear_LLeg2"
      "Bip01 L Foot": "Dogmeat_Rear_LLegAnkle"
      "Bip01 L Toe0": "Dogmeat_Rear_LLegToe1"

      # --- Rear Right Leg ---
      "Bip01 R Thigh": "Dogmeat_Rear_RLeg1"
      "Bip01 R Calf": "Dogmeat_Rear_RLeg2"
      "Bip01 R Foot": "Dogmeat_Rear_RLegAnkle"
      "Bip01 R Toe0": "Dogmeat_Rear_RLegToe1"

      # --- Tail ---
      "Bip01 Tail": "Dogmeat_Tail1"
      "Bip01 Tail1": "Dogmeat_Tail2"

      # --- Ears / Ponytails (FO3 uses Ponytail bones for ear flaps) ---
      "Bip01 Ponytail1": "Dogmeat_Ear_L1"
      "Bip01 Ponytail11": "Dogmeat_Ear_L2"
      "Bip01 Ponytail2": "Dogmeat_Ear_R1"
      "Bip01 Ponytail21": "Dogmeat_Ear_R2"

  # ================================================================
  # MIRELURK
  # FO3: Bip01-prefixed with Ponytail bones (tentacles/antennae)
  # FO4: Unprefixed quadruped-like with Front/Back leg pairs, mouth parts
  # ================================================================
  mirelurk:
    display_name: "FO3 Mirelurk → FO4 Mirelurk"
    signature_bones: ["Bip01 Ponytail9", "Bip01 L Finger0", "RightClawLower"]
    fo4_signature_bones: ["LFrontLegThigh", "RBackLegThigh", "LMiddleArm1Clavicle"]
    bones:
      # --- Root ---
      "Bip01": "Root"
      "Bip01 NonAccum": "Pelvis"

      # --- Spine ---
      "Bip01 Spine0": "SPINE1"
      "Bip01 Spine": "SPINE2"
      "Bip01 Spine1": "Rib"

      # --- Head ---
      "Bip01 Head": "HEAD"
      "Bip01 Neck": "Neck"

      # --- Left Arm (FO3 main claws → FO4 main arms) ---
      "Bip01 L Clavicle": "LArmClavicle"
      "Bip01 L UpperArm": "LArmUpper"
      "Bip01 L Forearm": "LArmFore"
      "Bip01 L Hand": "LArmPalm"
      "Bip01 L Finger0": "LPalmTum"

      # --- Right Arm ---
      "Bip01 R Clavicle": "RArmClavicle"
      "Bip01 R UpperArm": "RArmUpper"
      "Bip01 R Forearm": "RArmFore"
      "Bip01 R Hand": "RArmPalm"
      "Bip01 R Finger0": "RPalmTum"

      # --- Legs (FO3 biped legs → FO4 front legs) ---
