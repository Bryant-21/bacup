      "Bip01 Spine": "SPINE2"
      "Bip01 Spine1": "Spine3"
      "Bip01 Spine2": "Spine4"
      "Bip01 Spine3": "Chest"

      # --- Head / Neck ---
      "Bip01 Neck": "Neck"
