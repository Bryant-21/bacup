      "Bip01 L Calf": "LFrontLegCalf"
      "Bip01 L Foot": "LFrontLegFoot"
      "Bip01 L Toe0": "LFrontLegTip"

      "Bip01 R Thigh": "RFrontLegThigh"
      "Bip01 R Calf": "RFrontLegCalf"
      "Bip01 R Foot": "RFrontLegFoot"
      "Bip01 R Toe0": "RFrontLegTip"

  # ================================================================
  # MOLE RAT
  # FO3: Bip01-prefixed standard biped with Spine0-3, Tail chain
  # FO4: Unprefixed with Front/Back leg naming, Hips, Tail chain
