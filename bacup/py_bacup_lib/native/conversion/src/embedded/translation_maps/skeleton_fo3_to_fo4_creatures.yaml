      "Bip01 R Finger01": "Front_RLegToe2"

      # --- Rear Left Leg ---
      "Bip01 L Thigh": "Back_LLeg1"
      "Bip01 L Calf": "Back_LLeg2"
      "Bip01 L Foot": "Back_LLegAnkle"
      "Bip01 L Toe0": "Back_LLegToe1"
      "Bip01 L Toe01": "Back_LLegToe2"

      # --- Rear Right Leg ---
