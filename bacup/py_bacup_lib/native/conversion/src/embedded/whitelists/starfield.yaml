notes:
- Target for FO76->Starfield and SkyrimSE->Starfield. Extractor coverage is least mature for Starfield
  — expect some record types to be missing or under-populated in the YAML extract.
- Starfield adds many novel record types (ship/habitat modules, biomes, planets) that have no analogue
  in FO4/SkyrimSE. The whitelist will include them but no conversion map will exist.
- Starfield animations are NOT Havok — .rig/.af/.agx formats. Field names for animation-related records
  will differ from FO4.
- Case sensitivity still matters; the same DATA/Data distinction as FO4 applies.
