notes:
- Target for FO76->FO4, Skyrim SE->FO4, and FO3/FNV->FO4 conversions.
- 'Case matters: vanilla FO4 YAML uses BOTH ''DATA'' (raw 4-letter) and ''Data'' (structured) as different
  fields on the same record type.'
- 'Legit 4-letter UPPER fields in vanilla include: AVAC, BMMP, DATA, DNAM, ENAM, ERRO, FNAM, FROM, GNAM,
  HVAC, INCC, INTV, LNAM, NAME, NNAM, NOME, NOTA, NOTE, ONAM, OPIS, PARA, PNAM, STAN, STSC, TIPO, TNAM,
  TVDT, USER, VNAM, XCVL, XCVR, XCZA, XNAM, XORD, XWCN. Do NOT blanket-strip 4-letter UPPER — filter by
  this record-type-aware whitelist instead.'
- 'FO76->FO4 drops (guide 3.x): FormVersion, Fallout76MajorRecordFlags, ObjectPlacementDefaults, PhysicsSyncType,
  AJNG, AJXG, EILV, IBSD, WAAM, CVT0-CVT4, WTDT, WSAM, DNAMHealth, OverheatRateUp/Down, RGW3, DURL, VCRY,
  MAGF, CODV, QETL, QQSD, QTFS, PEDF, PERM, PERT, QMDE, QSDD, INRD, DESC (as raw subrecord). These are
  naturally excluded by this whitelist because they never appear in vanilla FO4.'
- 'Quest top-level fields in vanilla FO4 include at minimum: FormKey, VersionControl, EditorID, FormVersion,
  Version2, VirtualMachineAdapter, Name, Filter, DialogConditions, Data, Event, UnusedConditions, Stages,
  Aliases (verify against the generated whitelist for ''Quests'').'
