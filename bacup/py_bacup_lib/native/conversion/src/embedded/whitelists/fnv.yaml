notes:
- Target for FNV->FO4 conversion via the FO3/FNV->FO4 pipeline (see guides/conversion/fo3fnv_to_fo4_guide.md).
- Gamebryo-era engine — completely different record/field schema from FO4 (Creation Engine). Many FNV
  fields have no FO4 analogue and vice versa. Use only as a SOURCE-side reference; the FO4 whitelist is
  the actual conversion target.
- FNV uses .kf animations (keyframed); FO4 uses .hkx (Havok). Animation-related fields will not be cross-comparable.
