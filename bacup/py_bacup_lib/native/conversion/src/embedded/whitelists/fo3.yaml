notes:
- Target for FO3->FO4 conversion via the FO3/FNV->FO4 pipeline (see guides/conversion/fo3fnv_to_fo4_guide.md).
- Same Gamebryo-era engine as FNV. Schema is very close to FNV with minor differences (no perks rework,
  fewer weapon mods, etc.).
- Like FNV, this whitelist is mostly a source-side reference. The FO4 whitelist is the actual conversion
  target.
