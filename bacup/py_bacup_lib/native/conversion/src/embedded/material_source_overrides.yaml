# Material source path overrides for FO76->FO4 conversion.
# Keys: asset source_path (case-insensitive, forward or back slashes).
# Values: data-relative replacement source_path values.
#
# C-7: FO76 StormLightningHarvester/GlassDome.BGEM uses EyeCubeMap (environmental asset,
# wrong for a weapon receiver glass lens). Override to fan-correct version with
# mipblur_DefaultOutside1.dds cubemap + glassbulge_n.dds normal.

# TEMP_GroundTexture01 is a Bethesda dev placeholder that leaked into shipping data
# (referenced by NIFs via "C:\Projects\76\Build\PC\Data\..." absolute paths).
# FO76 swaps it at runtime via material swaps; do not port the raw debug material.
"materials/landscape/ground/temp_groundtexture01.bgsm": "materials/landscape/ground/forestrocks01.bgsm"

