archetype: deathclaw
behavior_name: DeathclawEverything
root_behavior_name: DeathclawRootBehavior
project_name: DeathclawProject
character_name: Deathclaw
model_after: deathclaw
states:
  - name: Idle
    role: idle
    loop: true
  - name: Locomotion
    role: locomotion
    loop: true
  - name: Attack
    role: attack
  - name: HitReact
    role: hit_react
  - name: Death
    role: death
    required: false
  - name: Special
    role: special
transitions:
  - event: move
    from: Idle
    to: Locomotion
  - event: stop
    from: Locomotion
    to: Idle
  - event: attack
    from: Locomotion
    to: Attack
  - event: recover
    from: Attack
    to: Idle
  - event: hit
    from: Attack
    to: HitReact
  - event: die
    from: HitReact
    to: Death
