notes:
- Target for FO76->SkyrimSE (unlikely) and Starfield->SkyrimSE. Primarily here for completeness of the
  conversion pipeline.
- Skyrim SE uses very different record types from FO4/FO76 — do NOT mix whitelists across games. Weapons,
  Ammunitions, Armors all have different field schemas.
- Form version for Skyrim SE is 44 (vs FO4's 131). Version2/VersionControl framing is shared but counts
  differ.
